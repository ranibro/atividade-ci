name: Primeiro Workflow

on:
  push:
jobs:
  primeiro-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Primeiro passo"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Status
        run: echo "Status ${{ job.status }}."
      - name: Data e hora
        run: date
      - name: Sistema Operacional
        run: uname -a
      - name: Versão do git
        run: git --version
      - name: conteúdo do arquivo README.md
        run: cat README.md
      - name: Lista arquivos
        run: ls -la

